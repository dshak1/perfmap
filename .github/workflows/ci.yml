name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate deterministic workload fixtures
        run: python3 scripts/generate_workload_fixtures.py

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Run smoke benchmark pipeline
        run: |
          python3 scripts/run_benchmarks.py \
            --preset smoke \
            --build-dir build \
            --output-root results/runs \
            --run-name ci-smoke \
            --skip-compare

      - name: Upload smoke benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perfmap-ci-smoke
          path: results/runs/ci-smoke
          retention-days: 7
